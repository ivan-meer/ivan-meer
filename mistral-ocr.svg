<svg xmlns="http://www.w3.org/2000/svg"
     width="1200" height="380" viewBox="0 0 1200 380"
     role="img" aria-labelledby="title desc">
  <title id="title">Mistral OCR App</title>
  <desc id="desc">Open-source web application for extracting text and images from PDFs using Mistral AI OCR API. Dark-themed hero showing document-to-markdown pipeline.</desc>

  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="doc-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="glow" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="380" rx="20" fill="url(#bg-grad)"/>

  <!-- Grid motif (OCR coordinate lines) -->
  <g opacity="0.04" stroke="#f8fafc" stroke-width="0.5">
    <line x1="0" y1="0" x2="1200" y2="0"/>
    <line x1="0" y1="40" x2="1200" y2="40"/>
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="280" x2="1200" y2="280"/>
    <line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="0" x2="0" y2="380"/>
    <line x1="200" y1="0" x2="200" y2="380"/>
    <line x1="400" y1="0" x2="400" y2="380"/>
    <line x1="600" y1="0" x2="600" y2="380"/>
    <line x1="800" y1="0" x2="800" y2="380"/>
    <line x1="1000" y1="0" x2="1000" y2="380"/>
    <line x1="1200" y1="0" x2="1200" y2="380"/>
  </g>

  <!-- Subtle glow under content area -->
  <rect x="50" y="40" width="1100" height="300" rx="12" fill="url(#glow)"/>

  <!-- ===== LEFT SIDE: Title & description ===== -->
  <g transform="translate(64, 60)">

    <!-- Category badge -->
    <rect x="0" y="0" width="120" height="28" rx="4" fill="#1e293b" stroke="#475569" stroke-width="1"/>
    <text x="60" y="19" fill="#94a3b8" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" text-anchor="middle" font-weight="500">DOCUMENT OCR</text>

    <!-- Project name -->
    <text x="0" y="76" fill="#f8fafc" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="48" font-weight="700" letter-spacing="-0.5">Mistral OCR</text>
    <text x="368" y="76" fill="#64748b" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="48" font-weight="300" letter-spacing="-0.5">App</text>

    <!-- Tagline -->
    <text x="0" y="116" fill="#cbd5e1" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="400" letter-spacing="0">Extract text and images from any document</text>

    <!-- Feature pills -->
    <g transform="translate(0, 148)">
      <rect x="0" y="0" width="100" height="30" rx="6" fill="#2563eb" fill-opacity="0.15" stroke="#2563eb" stroke-width="1" stroke-opacity="0.3"/>
      <text x="14" y="20" fill="#60a5fa" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="600">PDF · PNG · DOCX</text>

      <rect x="116" y="0" width="100" height="30" rx="6" fill="#8b5cf6" fill-opacity="0.15" stroke="#8b5cf6" stroke-width="1" stroke-opacity="0.3"/>
      <text x="130" y="20" fill="#a78bfa" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="600">Markdown · JSON · ZIP</text>

      <rect x="248" y="0" width="72" height="30" rx="6" fill="#10b981" fill-opacity="0.15" stroke="#10b981" stroke-width="1" stroke-opacity="0.3"/>
      <text x="258" y="20" fill="#34d399" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="600">Demo mode</text>
    </g>

    <!-- Metadata -->
    <g transform="translate(0, 210)">
      <circle cx="6" cy="6" r="4" fill="#2563eb"/>
      <text x="18" y="11" fill="#64748b" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13">Python / Flask + Mistral AI</text>
    </g>
    <text x="0" y="245" fill="#475569" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12"># pip install → python app.py → localhost:5000</text>

  </g>

  <!-- ===== RIGHT SIDE: Document extraction visual ===== -->
  <g transform="translate(700, 55)">

    <!-- PDF document card -->
    <g filter="url(#shadow)">
      <rect x="0" y="0" width="200" height="270" rx="8" fill="url(#doc-grad)" stroke="#334155" stroke-width="1"/>
      <!-- Document header -->
      <rect x="0" y="0" width="200" height="36" rx="8" fill="#1e293b"/>
      <rect x="0" y="20" width="200" height="16" fill="#1e293b"/>
      <line x1="16" y1="22" x2="120" y2="22" stroke="#475569" stroke-width="6" stroke-linecap="round"/>
      <!-- Document title lines -->
      <rect x="16" y="52" width="168" height="6" rx="3" fill="#334155"/>
      <rect x="16" y="62" width="120" height="6" rx="3" fill="#334155"/>
      <rect x="16" y="80" width="168" height="4" rx="2" fill="#334155" opacity="0.6"/>
      <rect x="16" y="88" width="168" height="4" rx="2" fill="#334155" opacity="0.6"/>
      <rect x="16" y="96" width="140" height="4" rx="2" fill="#334155" opacity="0.6"/>
      <!-- Image block in document -->
      <rect x="16" y="112" width="168" height="80" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1" stroke-dasharray="4 3"/>
      <text x="100" y="156" fill="#475569" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" text-anchor="middle" font-weight="500">chart.png</text>
      <!-- More text lines -->
      <rect x="16" y="204" width="168" height="4" rx="2" fill="#334155" opacity="0.6"/>
      <rect x="16" y="212" width="120" height="4" rx="2" fill="#334155" opacity="0.6"/>
      <rect x="16" y="224" width="168" height="4" rx="2" fill="#334155" opacity="0.6"/>
      <rect x="16" y="232" width="100" height="4" rx="2" fill="#334155" opacity="0.6"/>
      <rect x="16" y="244" width="168" height="4" rx="2" fill="#334155" opacity="0.6"/>
    </g>

    <!-- OCR coordinate overlay on document -->
    <g opacity="0.15">
      <line x1="16" y1="0" x2="16" y2="270" stroke="#60a5fa" stroke-width="1" stroke-dasharray="3 6"/>
      <line x1="100" y1="0" x2="100" y2="270" stroke="#60a5fa" stroke-width="1" stroke-dasharray="3 6"/>
      <line x1="184" y1="0" x2="184" y2="270" stroke="#60a5fa" stroke-width="1" stroke-dasharray="3 6"/>
      <line x1="0" y1="20" x2="200" y2="20" stroke="#60a5fa" stroke-width="1" stroke-dasharray="3 6"/>
      <line x1="0" y1="112" x2="200" y2="112" stroke="#60a5fa" stroke-width="1" stroke-dasharray="3 6"/>
      <line x1="0" y1="192" x2="200" y2="192" stroke="#60a5fa" stroke-width="1" stroke-dasharray="3 6"/>
    </g>

    <!-- Arrow: document → markdown -->
    <g transform="translate(216, 120)">
      <line x1="0" y1="15" x2="40" y2="15" stroke="#475569" stroke-width="2" stroke-dasharray="4 3"/>
      <polygon points="40,10 48,15 40,20" fill="#475569"/>
    </g>

    <!-- Markdown output card -->
    <g filter="url(#shadow)">
      <rect x="250" y="0" width="186" height="270" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
      <!-- Output header -->
      <rect x="250" y="0" width="186" height="36" rx="8" fill="#1e293b"/>
      <rect x="250" y="20" width="186" height="16" fill="#1e293b"/>
      <circle cx="266" cy="22" r="3" fill="#ef4444"/>
      <circle cx="278" cy="22" r="3" fill="#f59e0b"/>
      <circle cx="290" cy="22" r="3" fill="#10b981"/>
      <text x="320" y="26" fill="#64748b" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11">result.md</text>
      <!-- Markdown content -->
      <text x="264" y="64" fill="#60a5fa" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" font-weight="600"># Document Title</text>
      <text x="264" y="84" fill="#cbd5e1" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11">Extracted text from page 1</text>
      <text x="264" y="100" fill="#cbd5e1" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11">with full formatting and</text>
      <text x="264" y="116" fill="#cbd5e1" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11">structure preserved.</text>

      <!-- Image reference in markdown -->
      <rect x="264" y="132" width="158" height="24" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
      <rect x="274" y="136" width="16" height="16" rx="3" fill="#334155"/>
      <text x="296" y="148" fill="#a78bfa" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10">figure_1.png</text>

      <text x="264" y="176" fill="#cbd5e1" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11">Subsequent paragraphs</text>
      <text x="264" y="192" fill="#cbd5e1" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11">with inline formatting</text>
      <rect x="264" y="212" width="158" height="4" rx="2" fill="#334155"/>
      <rect x="264" y="220" width="130" height="4" rx="2" fill="#334155"/>
      <rect x="264" y="232" width="158" height="4" rx="2" fill="#334155"/>
      <rect x="264" y="240" width="100" height="4" rx="2" fill="#334155"/>
    </g>

    <!-- Extraction bracket -->
    <g transform="translate(230, 20)">
      <path d="M0,0 L-8,8 L0,16" fill="none" stroke="#2563eb" stroke-width="1.5" stroke-opacity="0.5"/>
    </g>
    <text x="238" y="148" fill="#2563eb" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="9" text-anchor="middle" fill-opacity="0.6">OCR</text>

  </g>

  <!-- Bottom metadata bar -->
  <g transform="translate(64, 345)">
    <rect x="0" y="0" width="1072" height="1" fill="#334155"/>
    <circle cx="6" cy="16" r="3" fill="#10b981"/>
    <text x="16" y="21" fill="#64748b" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12">v2.0.8</text>
    <text x="80" y="21" fill="#475569" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12">|</text>
    <text x="96" y="21" fill="#64748b" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12">MIT license</text>
    <text x="200" y="21" fill="#475569" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12">|</text>
    <text x="216" y="21" fill="#64748b" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12">Python 3.8+ · Flask · Mistral AI</text>
    <text x="480" y="21" fill="#475569" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12">|</text>
    <text x="496" y="21" fill="#64748b" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12">Demo mode available</text>
  </g>

</svg>
