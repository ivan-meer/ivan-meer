<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="800" y2="400">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#0e0e24"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg2)"/>

  <!-- Left: Naive RAG -->
  <rect x="30" y="40" width="340" height="320" rx="10" fill="#12122a" stroke="#2a2a5c" stroke-width="1"/>
  <text x="200" y="72" fill="#5a5a9a" font-size="11" font-family="monospace" text-anchor="middle">× Наивный RAG</text>

  <rect x="55" y="90" width="110" height="40" rx="6" fill="#1a1a4a" stroke="#4a4a8a" stroke-width="1"/>
  <text x="110" y="115" fill="#6a6aaa" font-size="10" font-family="monospace" text-anchor="middle">запрос целиком</text>
  <line x1="110" y1="130" x2="55" y2="160" stroke="#4a4a8a" stroke-width="1"/>
  <line x1="110" y1="130" x2="280" y2="160" stroke="#4a4a8a" stroke-width="1" stroke-dasharray="3 3"/>

  <!-- Chunker -->
  <rect x="55" y="160" width="80" height="35" rx="5" fill="#1a1a4a" stroke="#4a4a8a" stroke-width="1"/>
  <text x="95" y="182" fill="#6a6aaa" font-size="9" font-family="monospace" text-anchor="middle">чанкер</text>
  <line x1="95" y1="195" x2="95" y2="220" stroke="#4a4a8a" stroke-width="1"/>

  <rect x="45" y="220" width="100" height="60" rx="5" fill="#1a1a4a" stroke="#3a3a7a" stroke-width="1"/>
  <text x="95" y="242" fill="#5a5a8a" font-size="9" font-family="monospace" text-anchor="middle">фиксированные</text>
  <text x="95" y="258" fill="#5a5a8a" font-size="9" font-family="monospace" text-anchor="middle">чанки</text>
  <text x="95" y="274" fill="#3a3a6a" font-size="8" font-family="monospace" text-anchor="middle">256 токенов</text>

  <!-- Parallel path -->
  <rect x="240" y="160" width="100" height="60" rx="5" fill="#1a1a4a" stroke="#3a3a7a" stroke-width="1"/>
  <text x="290" y="182" fill="#5a5a8a" font-size="9" font-family="monospace" text-anchor="middle">векторный поиск</text>
  <text x="290" y="198" fill="#5a5a8a" font-size="9" font-family="monospace" text-anchor="middle">только cosine</text>
  <line x1="290" y1="220" x2="290" y2="280" stroke="#4a4a8a" stroke-width="1"/>

  <rect x="240" y="280" width="100" height="35" rx="5" fill="#1a1a4a" stroke="#3a3a7a" stroke-width="1"/>
  <text x="290" y="302" fill="#5a5a8a" font-size="9" font-family="monospace" text-anchor="middle">LLM ответ</text>

  <!-- Right: Production RAG -->
  <rect x="420" y="40" width="350" height="320" rx="10" fill="#0d1a14" stroke="#2a5a3c" stroke-width="1.5"/>
  <text x="595" y="72" fill="#4acc7a" font-size="11" font-family="monospace" text-anchor="middle">✓ Продакшен-RAG</text>

  <rect x="445" y="90" width="110" height="40" rx="6" fill="#0d2a1f" stroke="#3a8a5c" stroke-width="1"/>
  <text x="500" y="108" fill="#5add8a" font-size="9" font-family="monospace" text-anchor="middle">запрос</text>
  <text x="500" y="120" fill="#3a8a5c" font-size="8" font-family="monospace" text-anchor="middle">+ query rewriting</text>

  <line x1="500" y1="130" x2="500" y2="155" stroke="#3a8a5c" stroke-width="1"/>

  <rect x="445" y="155" width="100" height="50" rx="5" fill="#0d2a1f" stroke="#4acc7a" stroke-width="1"/>
  <text x="495" y="175" fill="#5add8a" font-size="9" font-family="monospace" text-anchor="middle">семантический</text>
  <text x="495" y="190" fill="#5add8a" font-size="9" font-family="monospace" text-anchor="middle">чанкинг</text>

  <line x1="500" y1="205" x2="500" y2="230" stroke="#3a8a5c" stroke-width="1"/>

  <!-- Hybrid -->
  <rect x="445" y="230" width="140" height="50" rx="5" fill="#0d2a1f" stroke="#5add8a" stroke-width="1.5" stroke-dasharray="3 3"/>
  <text x="515" y="252" fill="#5add8a" font-size="9" font-family="monospace" text-anchor="middle">гибридный поиск</text>
  <text x="515" y="268" fill="#3a8a5c" font-size="8" font-family="monospace" text-anchor="middle">vector + BM25 + RRF</text>

  <line x1="560" y1="280" x2="620" y2="280" stroke="#3a8a5c" stroke-width="1"/>
  <line x1="500" y1="280" x2="445" y2="280" stroke="#3a8a5c" stroke-width="1"/>

  <rect x="620" y="260" width="120" height="40" rx="5" fill="#0d2a1f" stroke="#4acc7a" stroke-width="1"/>
  <text x="680" y="282" fill="#5add8a" font-size="9" font-family="monospace" text-anchor="middle">реранжировщик</text>

  <line x1="680" y1="300" x2="500" y2="320" stroke="#3a8a5c" stroke-width="1"/>
  <rect x="445" y="315" width="110" height="30" rx="5" fill="#0d2a1f" stroke="#5add8a" stroke-width="1"/>
  <text x="500" y="334" fill="#5add8a" font-size="9" font-family="monospace" text-anchor="middle">LLM + контекст</text>

  <text x="400" y="380" fill="#3a6a4c" font-size="9" font-family="monospace" text-anchor="middle">наивный RAG (слева) против продакшен-RAG с гибридным поиском и реранжировкой (справа)</text>
</svg>
