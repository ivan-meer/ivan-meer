<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="600">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#10102a"/>
    </linearGradient>
    <linearGradient id="layer1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a3a5c"/>
      <stop offset="100%" stop-color="#0d2137"/>
    </linearGradient>
    <linearGradient id="layer2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a4a3c"/>
      <stop offset="100%" stop-color="#0d2a1f"/>
    </linearGradient>
    <linearGradient id="layer3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4a1a5c"/>
      <stop offset="100%" stop-color="#2a0d37"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-soft">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="600" fill="url(#bg)"/>
  
  <!-- Grid lines -->
  <g opacity="0.04" stroke="#4a8aff" stroke-width="0.5">
    <line x1="0" y1="100" x2="1200" y2="100"/><line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/><line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
  </g>

  <!-- Layer 1: Working Memory (bottom) -->
  <rect x="80" y="430" width="1040" height="140" rx="12" fill="url(#layer1)" stroke="#2a6aac" stroke-width="1.5" opacity="0.9"/>
  <g filter="url(#glow)">
    <circle cx="140" cy="500" r="24" stroke="#4a9aff" stroke-width="2" fill="none"/>
    <circle cx="140" cy="500" r="8" fill="#4a9aff" opacity="0.6"/>
  </g>
  <rect x="200" y="470" width="120" height="28" rx="6" fill="#1a3a6c" stroke="#3a7acc" stroke-width="1"/>
  <rect x="340" y="470" width="120" height="28" rx="6" fill="#1a3a6c" stroke="#3a7acc" stroke-width="1"/>
  <rect x="480" y="470" width="120" height="28" rx="6" fill="#1a3a6c" stroke="#3a7acc" stroke-width="1"/>
  <rect x="620" y="470" width="120" height="28" rx="6" fill="#1a3a6c" stroke="#3a7acc" stroke-width="1"/>
  <text x="200" y="462" fill="#4a9aff" font-size="10" font-family="monospace">текущий диалог</text>

  <!-- Arrow up: Working → Long-term -->
  <line x1="600" y1="430" x2="600" y2="370" stroke="#3a8a5c" stroke-width="1.5" stroke-dasharray="4 4"/>
  <polygon points="600,365 594,375 606,375" fill="#3a8a5c"/>

  <!-- Layer 2: Long-term Memory (middle) -->
  <rect x="80" y="230" width="1040" height="140" rx="12" fill="url(#layer2)" stroke="#3aaa6c" stroke-width="1.5" opacity="0.9"/>
  
  <!-- Vector database cubes -->
  <g filter="url(#glow)">
    <rect x="140" y="265" width="40" height="40" rx="4" fill="#1a4a3c" stroke="#4acc7a" stroke-width="1.5"/>
    <rect x="140" y="265" width="40" height="40" rx="4" fill="#2a6a4c" stroke="#5add8a" stroke-width="1" transform="translate(4,-4)"/>
    <text x="148" y="293" fill="#5add8a" font-size="10" font-family="monospace">v1</text>
    <rect x="195" y="275" width="35" height="30" rx="3" fill="#1a4a3c" stroke="#4acc7a" stroke-width="1"/>
    <rect x="195" y="275" width="35" height="30" rx="3" fill="#2a6a4c" stroke="#5add8a" stroke-width="1" transform="translate(3,-3)"/>
    <text x="202" y="297" fill="#5add8a" font-size="9" font-family="monospace">v2</text>
    <rect x="243" y="282" width="30" height="22" rx="3" fill="#1a4a3c" stroke="#4acc7a" stroke-width="1"/>
    <rect x="243" y="282" width="30" height="22" rx="3" fill="#2a6a4c" stroke="#5add8a" stroke-width="1" transform="translate(2,-2)"/>
  </g>

  <text x="300" y="290" fill="#5add8a" font-size="11" font-family="monospace">векторные эмбеддинги</text>
  <text x="300" y="310" fill="#3a8a5c" font-size="9" font-family="monospace">pgvector / Qdrant</text>

  <!-- Retrieval indicator -->
  <rect x="600" y="270" width="140" height="60" rx="8" fill="#1a4a3c" stroke="#5add8a" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="620" y="296" fill="#5add8a" font-size="10" font-family="monospace">гибридный поиск</text>
  <text x="620" y="314" fill="#3a8a5c" font-size="9" font-family="monospace">vector + BM25</text>

  <!-- Arrow up: Long-term → Semantic -->
  <line x1="600" y1="230" x2="600" y2="170" stroke="#7a3aac" stroke-width="1.5" stroke-dasharray="4 4"/>
  <polygon points="600,165 594,175 606,175" fill="#7a3aac"/>

  <!-- Layer 3: Semantic Memory (top) -->
  <rect x="80" y="30" width="1040" height="140" rx="12" fill="url(#layer3)" stroke="#8a5acc" stroke-width="1.5" opacity="0.9"/>

  <!-- Knowledge graph -->
  <g filter="url(#glow-soft)">
    <circle cx="180" cy="100" r="10" fill="#6a3a9c" stroke="#9a6aec" stroke-width="1.5"/>
    <circle cx="250" cy="80" r="7" fill="#6a3a9c" stroke="#9a6aec" stroke-width="1"/>
    <circle cx="220" cy="130" r="5" fill="#6a3a9c" stroke="#9a6aec" stroke-width="1"/>
    <circle cx="310" cy="110" r="8" fill="#6a3a9c" stroke="#9a6aec" stroke-width="1"/>
    <circle cx="150" cy="130" r="5" fill="#6a3a9c" stroke="#9a6aec" stroke-width="1"/>
    <line x1="180" y1="100" x2="250" y2="80" stroke="#7a4abc" stroke-width="0.8"/>
    <line x1="180" y1="100" x2="220" y2="130" stroke="#7a4abc" stroke-width="0.8"/>
    <line x1="180" y1="100" x2="150" y2="130" stroke="#7a4abc" stroke-width="0.8"/>
    <line x1="180" y1="100" x2="310" y2="110" stroke="#7a4abc" stroke-width="0.8"/>
    <line x1="250" y1="80" x2="310" y2="110" stroke="#7a4abc" stroke-width="0.8"/>
  </g>
  <text x="340" y="105" fill="#9a6aec" font-size="11" font-family="monospace">граф знаний: факты → связи</text>

  <!-- Connection lines between layers -->
  <line x1="850" y1="500" x2="950" y2="500" stroke="#2a6aac" stroke-width="1" opacity="0.5"/>
  <line x1="950" y1="500" x2="950" y2="300" stroke="#3a8a5c" stroke-width="1" opacity="0.5"/>
  <circle cx="950" cy="500" r="3" fill="#4a9aff"/>
  <circle cx="950" cy="300" r="3" fill="#5add8a"/>

  <!-- Labels on the right -->
  <text x="960" y="500" fill="#4a9aff" font-size="11" font-family="monospace">суммаризация</text>
  <text x="960" y="296" fill="#5add8a" font-size="11" font-family="monospace">извлечение фактов</text>

  <text x="600" y="585" fill="#4a6a8a" font-size="11" font-family="monospace" text-anchor="middle">три слоя памяти AI-агента: краткосрочная · долгосрочная · семантическая</text>
</svg>
